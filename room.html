<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room — Loup Garou</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/theme.css" />
<!--
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>
    eruda.init();
    eruda.position({ x: 10, y: 10 });
  </script> -->

  <style>
    /* Page-specific layout — no colours here */
    .page-main {
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 600px;
      margin: 0 auto;
    }

    .share-qr-wrap {
      background: #fff;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .share-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .share-modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      line-height: 1;
      transition: color 0.15s;
    }
    .share-modal-close:hover { color: var(--text-primary); }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Fixed bottom bar — contient timer + contrôles en colonne */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
    }

    .host-controls,
    .game-controls {
      padding: 12px 16px;
      background-color: var(--bg-navbar);
      border-top: 1.5px solid var(--border-subtle);
      display: flex;
      gap: 10px;
    }

    body.has-host-controls .page-main,
    body.has-game-controls .page-main {
      padding-bottom: 80px;
    }

    /* Waiting/game views inherit the flex-column layout of page-main */
    #waitingView,
    #gameView {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* End game button — compact to match Quitter */
    #endGameBtn {
      font-size: 0.78rem;
      padding: 8px 14px;
    }

    .section-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Role reveal modal */
    .role-reveal-emoji { font-size: 3.5rem; text-align: center; }
    .role-reveal-name  { font-size: 1.3rem; font-weight: 800; color: var(--text-primary); text-align: center; }
    .role-reveal-desc  { font-size: 0.875rem; color: var(--text-secondary); text-align: center; }

    /* Countdown timer — dans .bottom-bar, au-dessus des contrôles */
    .countdown-timer {
      display: flex;
      justify-content: center;
      padding: 6px 16px;
      background: var(--bg-navbar);
      border-top: 1.5px solid var(--border-subtle);
    }
    #countdownDisplay {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      color: var(--color-danger);
    }

    /* Sleep overlay */
    .sleep-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--sleep-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .sleep-moon { font-size: 5rem; }
    .sleep-label {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="color-strip"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="flex items-center gap-3 min-w-0">
      <span class="navbar-logo">🐺</span>
      <span class="nav-username" id="navUsername"></span>
    </div>
    <div class="flex gap-2 items-center">
      <button class="btn btn-ghost hidden" id="endGameBtn">⏹ Terminer</button>
      <button class="btn btn-danger" id="leaveBtn">Quitter</button>
    </div>
  </nav>

  <main class="page-main">

    <!-- Status bar — always visible -->
    <div class="status-bar">
      <span class="status-dot connecting" id="statusDot"></span>
      <span id="statusText">Connexion…</span>
      <span class="player-count" id="playerCount"></span>
    </div>

    <!-- Waiting room view -->
    <div id="waitingView">
      <span class="room-code-tag room-code-clickable" id="roomCodeDisplay" title="Copier le code">------</span>

      <div>
        <div class="section-label">Joueurs</div>
        <div class="players-grid" id="playersGrid"></div>
      </div>
    </div>

    <!-- Game view (hidden until game starts) -->
    <div id="gameView" style="display:none">
      <div>
        <div class="section-label section-label-row">
          <span>Joueurs</span>
          <span id="roundDisplay"></span>
        </div>
        <div class="players-grid" id="gamePlayersGrid"></div>
      </div>
    </div>

  </main>

  <!-- Bottom bar — timer + controls empilés en colonne -->
  <div class="bottom-bar" id="bottomBar">

    <!-- Countdown timer (masqué par défaut) -->
    <div class="countdown-timer hidden" id="countdownTimer">
      <span id="countdownDisplay">00:00:000</span>
    </div>

    <!-- Host controls: waiting room only -->
    <div class="host-controls hidden" id="hostControls">
      <button class="btn btn-ghost" id="settingsBtn">⚙ Paramètres</button>
      <button class="btn btn-primary flex-1" id="startBtn" disabled>Lancer</button>
    </div>

    <!-- Game controls: game mode only -->
    <div class="game-controls hidden" id="gameControls">
      <button class="btn btn-ghost hidden flex-1" id="startNightBtn">🌙</button>
      <button class="btn btn-primary flex-1" id="showRoleBtn">👁 Mon rôle</button>
      <div id="selectBtnWrapper" class="select-btn-wrapper hidden">
        <span id="selectLabel" class="select-label"></span>
        <button class="btn btn-ghost" id="selectBtn">✓ Sélectionner</button>
      </div>
      <div id="choiceWrapper" class="choice-wrapper hidden">
        <span id="choiceLabel" class="select-label"></span>
        <div id="choiceButtons" class="choice-buttons"></div>
      </div>
    </div>

  </div>

  <!-- Settings bottom sheet (host only) -->
  <div class="settings-overlay hidden" id="settingsOverlay">
    <div class="settings-sheet">
      <div class="settings-handle"></div>
      <div class="settings-header">
        <span>Paramètres</span>
        <button class="settings-close-btn" id="settingsCloseBtn">✕</button>
      </div>

      <!-- Section : Rôles -->
      <div class="settings-section">
        <button class="section-toggle" id="rolesToggle">
          <span>Rôles</span>
          <span class="section-toggle-icon rotated" id="rolesToggleIcon">▼</span>
        </button>
        <div class="section-content" id="rolesContent">
          <div class="roles-list" id="rolesGrid"></div>
        </div>
      </div>

      <!-- Section : Scénario -->
      <div class="settings-section">
        <button class="section-toggle" id="scenarioToggle">
          <span>Scénario</span>
          <span class="section-toggle-icon rotated" id="scenarioToggleIcon">▼</span>
        </button>
        <div class="section-content" id="scenarioContent">
          <label class="settings-checkbox-row">
            <input type="checkbox" id="allowBlankVoteCheck" />
            <span>Vote blanc autorisé <small>(vote du village)</small></span>
          </label>
          <label class="settings-checkbox-row">
            <input type="checkbox" id="voteTimeoutCheck" />
            <span>Limiter le vote du village dans le temps</span>
          </label>
          <div class="settings-field" id="voteTimeoutField">
            <div class="settings-field-header">
              <span>Durée du vote (secondes)</span>
            </div>
            <input type="number" class="input" id="voteTimeoutInput" min="10" max="3600" step="1" value="120">
          </div>
        </div>
      </div>

      <!-- Section : Hôte -->
      <div class="settings-section">
        <button class="section-toggle" id="hostToggle">
          <span>Hôte</span>
          <span class="section-toggle-icon rotated" id="hostToggleIcon">▼</span>
        </button>
        <div class="section-content" id="hostContent">
          <label class="settings-checkbox-row">
            <input type="checkbox" id="hostSpectatorCheck" />
            <span>Spectateur <small>(non jouable)</small></span>
          </label>
        </div>
      </div>

      <!-- Section : Voix -->
      <div class="settings-section">
        <button class="section-toggle" id="voiceToggle">
          <span>Voix</span>
          <span class="section-toggle-icon rotated" id="voiceToggleIcon">▼</span>
        </button>
        <div class="section-content" id="voiceContent">

          <div class="settings-field">
            <div class="settings-field-header"><span>Voix</span></div>
            <select class="settings-select" id="voiceSelect">
              <option value="">Voix par défaut</option>
            </select>
          </div>

          <div class="settings-field">
            <div class="settings-field-header">
              <span>Tonalité</span>
              <span class="settings-field-value" id="pitchValue">1.0</span>
            </div>
            <input type="range" class="settings-range" id="pitchRange" min="0" max="2" step="0.1" value="1">
          </div>

          <div class="settings-field">
            <div class="settings-field-header">
              <span>Vitesse</span>
              <span class="settings-field-value" id="rateValue">1.0</span>
            </div>
            <input type="range" class="settings-range" id="rateRange" min="0.5" max="2" step="0.1" value="1">
          </div>

          <div class="settings-field">
            <div class="settings-field-header">
              <span>Volume</span>
              <span class="settings-field-value" id="volumeValue">1.0</span>
            </div>
            <input type="range" class="settings-range" id="volumeRange" min="0" max="1" step="0.1" value="1">
          </div>

          <div class="settings-field">
            <input type="text" class="input" id="voiceTestInput"
              placeholder="Texte à prononcer…"
              value="La nuit tombe sur le village. Les loups se réveillent.">
          </div>
          <div class="settings-field">
            <button class="btn btn-primary w-full" id="voiceTestBtn">▶ Tester</button>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- Share modal -->
  <div class="modal-overlay hidden" id="shareModal">
    <div class="modal-box flex flex-col gap-4">
      <div class="share-modal-header">
        <span class="modal-title" style="margin-bottom:0">Partager la room</span>
        <button class="share-modal-close" id="shareModalCloseBtn">✕</button>
      </div>
      <div class="share-qr-wrap">
        <canvas id="shareQrCanvas"></canvas>
      </div>
      <div class="flex gap-3">
        <button class="btn btn-ghost flex-1" id="copyCodeBtn">Copier le code</button>
        <button class="btn btn-cyan flex-1" id="copyLinkBtn">Copier le lien</button>
      </div>
    </div>
  </div>

  <!-- Countdown timer -->
  <div class="countdown-timer hidden" id="countdownTimer">
    <span id="countdownDisplay">00:00:000</span>
  </div>

  <!-- Sleep overlay -->
  <div class="sleep-overlay" id="sleepOverlay" style="display:none">
    <div class="sleep-moon">🌙</div>
    <p class="sleep-label">Fermez les yeux…</p>
    <button class="btn btn-ghost hidden" id="sleepWakeBtn">☀️ Réveiller tout le monde</button>
  </div>

  <!-- Role reveal modal -->
  <div class="modal-overlay hidden" id="roleModal">
    <div class="modal-box flex flex-col items-center gap-4">
      <div class="role-reveal-emoji" id="roleRevealEmoji"></div>
      <div class="role-reveal-name"  id="roleRevealName"></div>
      <p   class="role-reveal-desc"  id="roleRevealDesc"></p>
      <button class="btn btn-ghost w-full" id="closeRoleBtn">Fermer</button>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
  <script src="js/db.js"></script>
  <script src="js/players-grid.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/qrcode.js"></script>
  <script src="js/roles.js"></script>
  <script src="js/connection.js"></script>
  <script src="js/game.js"></script>
  <script src="js/state.js"></script>
  <script src="js/flow.js"></script>
  <script src="js/room.js"></script>

</body>
</html>
