<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loup Garou</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/theme.css" />

  <style>
    /* Page-specific layout — no colours here */
    .profile-card {
      background-color: var(--bg-surface);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      width: 100%;
      max-width: 340px;
    }

    .app-title {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      text-shadow: 0 0 40px rgba(124,77,255,0.5);
    }

    .app-subtitle {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
    }

    .btn-scan-qr {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background-color: var(--bg-card);
      border: 2px solid var(--border-default);
      color: var(--text-secondary);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-scan-qr:hover { border-color: var(--color-primary); color: var(--text-primary); }

    .scanner-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .scanner-overlay.hidden { display: none; }

    .scanner-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scanner-ui {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .scanner-frame {
      width: 230px;
      height: 230px;
      border: 3px solid var(--candy-cyan);
      border-radius: var(--radius-md);
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.65);
    }

    .scanner-hint {
      color: var(--text-primary);
      font-size: 0.875rem;
      text-align: center;
      padding: 0 24px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }
  </style>
</head>
<body>

  <div class="color-strip"></div>

  <main class="min-h-screen flex flex-col items-center justify-center p-4 gap-8">

    <!-- Logo -->
    <div class="text-center">
      <div class="app-title">🐺 Loup Garou</div>
      <div class="app-subtitle mt-1">Qui se cache parmis vous ?</div>
    </div>

    <!-- Profile card -->
    <div class="profile-card flex flex-col items-center gap-4">

      <!-- Avatar -->
      <button class="avatar-uploader" id="avatarBtn" type="button" aria-label="Changer l'avatar">
        <span class="avatar-placeholder" id="avatarPlaceholder">👤</span>
        <img id="avatarImg" class="hidden" alt="Avatar" />
        <div class="avatar-overlay">📷</div>
      </button>
      <input type="file" id="avatarFileInput"      accept="image/*"                    class="hidden" />
      <input type="file" id="avatarCameraInput"   accept="image/*" capture="environment" class="hidden" />

      <!-- Username -->
      <input
        type="text"
        id="usernameInput"
        class="input"
        placeholder="Ton pseudo…"
        maxlength="20"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <!-- Action buttons -->
    <div class="flex gap-4 w-full" style="max-width: 340px;">
      <button id="createBtn" class="btn btn-cyan flex-1">Créer</button>
      <button id="joinBtn"   class="btn btn-lime  flex-1">Rejoindre</button>
    </div>

  </main>

  <!-- Avatar source choice -->
  <div class="modal-overlay hidden" id="avatarSourceModal">
    <div class="modal-box flex flex-col gap-3">
      <div class="modal-title">Photo de profil</div>
      <button type="button" class="btn btn-ghost w-full" id="avatarCameraBtn">📷 Prendre une photo</button>
      <button type="button" class="btn btn-ghost w-full" id="avatarGalleryBtn">🖼 Choisir dans la galerie</button>
    </div>
  </div>

  <!-- Join modal -->
  <div id="joinModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="joinTitle">
    <div class="modal-box flex flex-col gap-4">
      <div class="modal-title" id="joinTitle">Rejoindre une partie</div>
      <div class="flex gap-2 items-center">
        <input
          type="text"
          id="roomCodeInput"
          class="input flex-1 min-w-0"
          placeholder="Code ou lien join.html#…"
          maxlength="256"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <button type="button" class="btn-scan-qr" id="scanQrBtn" aria-label="Scanner un QR code">📷</button>
      </div>
      <div class="flex gap-3">
        <button id="cancelJoinBtn"  class="btn btn-ghost   flex-1">Annuler</button>
        <button id="confirmJoinBtn" class="btn btn-primary flex-1">Rejoindre</button>
      </div>
    </div>
  </div>

  <!-- QR Scanner overlay -->
  <div class="scanner-overlay hidden" id="scannerOverlay">
    <video id="scannerVideo" class="scanner-video" autoplay playsinline muted></video>
    <div class="scanner-ui">
      <div class="scanner-frame"></div>
      <p class="scanner-hint">Pointez la caméra vers le QR code</p>
      <button class="btn btn-ghost" id="cancelScanBtn">Annuler</button>
    </div>
    <canvas id="scannerCanvas" class="hidden"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1/dist/jsQR.js"></script>
  <script src="js/db.js"></script>
  <script src="js/qrcode.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
